<!DOCTYPE html>
<html lang="tr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Serdar Cevher</title>
	<style>
		html {
			height: 100%;
			background-color: #0a1128;
		}

		body {
			height: 100%;
			margin: 0;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			/* Lacivertten koyu griye gradient */
			background: linear-gradient(135deg, #0a1128 0%, #2b2b2b 100%);
			background-attachment: fixed;
			color: #ffffff;
			display: flex;
			justify-content: center;
			align-items: center;
			overflow: hidden;
		}

		.container {
			text-align: center;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 24px;
			animation: fadeIn 1.5s ease-in-out;
		}

		.profile-pic {
			width: 150px;
			height: 150px;
			border-radius: 50%;
			object-fit: cover;
			border: 2px solid rgba(255, 255, 255, 0.1);
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
			background-color: rgba(255, 255, 255, 0.05);
			transition: transform 0.3s ease, box-shadow 0.3s ease;
		}

		.profile-pic:hover {
			transform: scale(1.05);
			box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
		}

		.tagline {
			font-size: 1.25rem;
			font-weight: 300;
			letter-spacing: 2px;
			opacity: 0.85;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<!-- src kısmına kendi fotoğrafının yolunu veya adını (örneğin "profile.jpg") yazabilirsin -->
		<img src="img/profile.webp" alt="Profile Picture" class="profile-pic" />
		<div class="tagline">baştan başlıyor...</div>
	</div>
</body>

</html>
